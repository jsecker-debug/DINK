name: PickleHub
options:
  bundleIdPrefix: com.picklehub
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  PickleHub:
    type: application
    platform: iOS
    sources:
      - PickleHub
    resources:
      - path: PickleHub/Resources
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: PickleHub/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.picklehub.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR: false
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: PickleHub/Resources/PickleHub.entitlements

  PickleHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PickleHubTests
    dependencies:
      - target: PickleHub
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PickleHub:
    build:
      targets:
        PickleHub: all
        PickleHubTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: SUPABASE_URL
          value: "https://lqdlarbcrdkqpnsdkxcv.supabase.co"
          isEnabled: true
        - variable: SUPABASE_ANON_KEY
          value: "sb_publishable_6Os07h5oTWwzjCRXj50Vgg_xK5IkieG"
          isEnabled: true
    test:
      config: Debug
      targets:
        - PickleHubTests
