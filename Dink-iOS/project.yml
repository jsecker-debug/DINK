name: Dink
options:
  bundleIdPrefix: com.dink
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Dink:
    type: application
    platform: iOS
    sources:
      - Dink
    resources:
      - path: Dink/Resources
        buildPhase: resources
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        INFOPLIST_FILE: Dink/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dink.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR: false
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: Dink/Resources/Dink.entitlements

  DinkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DinkTests
    dependencies:
      - target: Dink
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Dink:
    build:
      targets:
        Dink: all
        DinkTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: SUPABASE_URL
          value: "$(SUPABASE_URL)"
          isEnabled: true
        - variable: SUPABASE_ANON_KEY
          value: "$(SUPABASE_ANON_KEY)"
          isEnabled: true
    test:
      config: Debug
      targets:
        - DinkTests
